<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minimal Test - Does Button Work?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f0f0f0; }
        
        .start-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .start-screen h2 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        
        .rules {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px 50px;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            background: #1e88e5;
            color: white;
        }
        
        .game-section {
            display: none;
            padding: 50px;
            text-align: center;
        }
        
        .game-section.active { display: block; }
        
        #log {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: black;
            color: #0f0;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h2>Minimal Test</h2>
        <div class="rules">
            <p>Enter name:</p>
            <input type="text" id="playerName" placeholder="Type name" style="padding: 10px; margin: 10px 0; width: 100%;">
        </div>
        <button id="startGame" class="btn">Start Game</button>
    </div>
    
    <div class="game-section" id="gameSection">
        <h1>GAME IS RUNNING!</h1>
        <p id="welcomeMsg"></p>
    </div>
    
    <div id="log"></div>
    
    <script>
        const log = document.getElementById('log');
        function msg(text) {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            console.log(text);
        }
        
        msg('Script loaded');
        
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startGame');
        const nameInput = document.getElementById('playerName');
        const gameSection = document.getElementById('gameSection');
        const welcomeMsg = document.getElementById('welcomeMsg');
        
        msg('Elements found: ' + [startScreen, startBtn, nameInput, gameSection].every(e => !!e));
        
        if (startBtn) {
            startBtn.addEventListener('click', function(e) {
                msg('BUTTON CLICKED!');
                e.preventDefault();
                
                const name = nameInput.value.trim();
                msg('Name entered: "' + name + '"');
                
                if (!name) {
                    msg('No name - showing alert');
                    alert('Please enter your name!');
                    return;
                }
                
                msg('Hiding start screen...');
                startScreen.style.display = 'none';
                
                msg('Showing game section...');
                gameSection.classList.add('active');
                welcomeMsg.textContent = 'Welcome ' + name + '!';
                
                msg('SUCCESS - Game started!');
            });
            msg('Click listener attached');
        } else {
            msg('ERROR: Button not found!');
        }
    </script>
</body>
</html>
